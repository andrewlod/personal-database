name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: src/web/package-lock.json

    - name: Install Python deps
      run: |
        pip install torch==2.3.0+cpu --index-url https://download.pytorch.org/whl/cpu
        pip install -r <(grep -v '^torch' requirements.txt)

    - name: Install Node deps
      run: cd src/web && npm ci

    - name: Lint
      run: make lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: src/web/package-lock.json

    - name: Install Python deps
      run: |
        pip install torch==2.3.0+cpu --index-url https://download.pytorch.org/whl/cpu
        pip install -r <(grep -v '^torch' requirements.txt)

    - name: Install Node deps
      run: cd src/web && npm ci

    - name: Type check
      run: make typecheck

  backend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install torch==2.3.0+cpu --index-url https://download.pytorch.org/whl/cpu
        pip install -r <(grep -v '^torch' requirements.txt)

    - name: Run backend tests
      run: make test-backend

  frontend-unit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: src/web/package-lock.json

    - name: Install dependencies
      run: cd src/web && npm ci

    - name: Run unit tests
      run: cd src/web && npm test -- --ci --watchAll=false

  frontend-e2e:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: src/web/package-lock.json

    - name: Install dependencies
      run: cd src/web && npm ci

    - name: Install Playwright browsers
      run: cd src/web && npx playwright install --with-deps chromium

    - name: Run E2E tests
      run: cd src/web && npx playwright test
